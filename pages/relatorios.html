<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinControl — Relatórios</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variaveis.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/componentes.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <h1 class="sidebar__logo">Fin<span>Control</span></h1>
      <nav class="sidebar__nav" aria-label="Menu principal">
        <ul>
          <li><a href="../index.html">Dashboard</a></li>
          <li><a href="transacoes.html">Transações</a></li>
          <li><a href="contas.html">Contas &amp; Cartões</a></li>
          <li><a href="metas.html">Metas &amp; Orçamento</a></li>
          <li><a href="investimentos.html">Investimentos</a></li>
          <li><a href="relatorios.html" class="ativo">Relatórios</a></li>
          <li><a href="configuracoes.html">Configurações</a></li>
        </ul>
      </nav>
    </aside>

    <main class="conteudo">
      <header class="conteudo__header">
        <h2>Relatórios</h2>
      </header>

      <!-- Filtro de período -->
      <section class="painel" aria-label="Filtro de período">
        <div class="filtro-periodo">
          <div class="formulario__grupo">
            <label for="periodo-inicio">De</label>
            <input type="month" id="periodo-inicio" />
          </div>
          <div class="formulario__grupo">
            <label for="periodo-fim">Até</label>
            <input type="month" id="periodo-fim" />
          </div>
          <button type="button" id="botao-exportar" class="botao botao--secundario">
            ⬇ Exportar CSV
          </button>
        </div>
      </section>

      <!-- Receitas x Despesas -->
      <section class="painel" aria-label="Receitas e despesas por mês">
        <h3>Receitas × Despesas por mês</h3>
        <div class="grafico-container">
          <canvas id="grafico-barras"></canvas>
        </div>
      </section>

      <!-- Evolução do saldo -->
      <section class="painel" aria-label="Evolução do saldo">
        <h3>Evolução do saldo no período</h3>
        <div class="grafico-container">
          <canvas id="grafico-linha"></canvas>
        </div>
      </section>

      <p id="relatorio-vazio" class="ultimas__vazio" hidden>
        Nenhuma transação no período selecionado.
      </p>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/categorias.js"></script>
  <script src="../js/graficos.js"></script>
  <script src="../js/relatorios.js"></script>
</body>
</html>
